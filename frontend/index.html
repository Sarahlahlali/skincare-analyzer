<script>

const ingredientDatabase = {
  "niacinamide": {benefit:"oil control", warning:false},
  "glycerin": {benefit:"hydration", warning:false},
  "salicylic acid": {benefit:"acne treatment", warning:false},
  "fragrance": {benefit:"", warning:true},
  "parfum": {benefit:"", warning:true},
  "alcohol denat": {benefit:"", warning:true}
};

function analyzeIngredients() {

  let text = document.getElementById("ingredients").value.toLowerCase();

  // Remove parentheses like (Aqua)
  text = text.replace(/\(.*?\)/g, "");

  // Split ingredients by comma
  let ingredients = text.split(",");

  let good = [];
  let warnings = [];

  ingredients.forEach(i => {

    let ingredient = i.trim();

    if(ingredientDatabase[ingredient]){

      let data = ingredientDatabase[ingredient];

      if(data.warning){
        warnings.push("⚠ " + ingredient);
      } else {
        good.push("✔ " + ingredient + " – " + data.benefit);
      }

    }

  });

  let resultHTML = "";

  if(good.length > 0){
    resultHTML += "<h3>Good Ingredients</h3>" + good.join("<br>");
  }

  if(warnings.length > 0){
    resultHTML += "<h3>Warnings</h3>" + warnings.join("<br>");
  }

  document.getElementById("result").innerHTML = resultHTML;

}

</script>
