<!DOCTYPE html>
<html>
<head>
  <title>Skincare Analyzer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff7f3;
      color: #2b2b2b;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 40px 20px;
    }

    .hero {
      text-align: center;
      padding: 50px 20px;
      background: linear-gradient(135deg, #ffe3dc, #fffaf7);
      border-radius: 28px;
      margin-bottom: 30px;
    }

    .hero h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
      color: #6b5f5b;
    }

    .analyzer-card {
      background: white;
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
      margin-bottom: 30px;
    }

    textarea, select {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid #ddd;
      font-size: 16px;
      margin-top: 10px;
      box-sizing: border-box;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 16px;
      background: #111;
      color: white;
      border: none;
      border-radius: 999px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .score-card, .result-section, .product-card {
      background: white;
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }

    .score-number {
      font-size: 36px;
      font-weight: bold;
      margin: 10px 0;
    }

    .low { color: #2f8f5b; }
    .medium { color: #c88719; }
    .high { color: #c0392b; }

    .results {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-top: 30px;
    }

    .tag {
      display: inline-block;
      background: #f5e1dc;
      padding: 8px 12px;
      border-radius: 999px;
      margin: 5px;
      font-size: 14px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .product-card h4 {
      margin-bottom: 6px;
    }

    .small {
      color: #6b5f5b;
      font-size: 14px;
    }

    .disclaimer {
      margin-top: 30px;
      font-size: 13px;
      color: #777;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="container">

    <section class="hero">
      <h1>Skincare Ingredient Analyzer</h1>
      <p>Paste your product ingredients and get a simple skin-friendly breakdown, acne risk score, irritation flags, and product recommendations.</p>
    </section>

    <section class="analyzer-card">
      <h2>Analyze Your Product</h2>

      <label>Your skin type</label>
      <select id="skinType">
        <option value="normal">Normal</option>
        <option value="oily">Oily / Acne-Prone</option>
        <option value="dry">Dry</option>
        <option value="sensitive">Sensitive</option>
      </select>

      <label>Paste ingredient list</label>
      <textarea id="ingredients" rows="9" placeholder="Example: Water, Niacinamide, Glycerin, Fragrance, Salicylic Acid"></textarea>

      <button onclick="analyzeIngredients()">Analyze Ingredients</button>
    </section>

    <div id="result"></div>

    <p class="disclaimer">
      This tool is for educational skincare guidance only and is not medical advice.
    </p>

  </div>

  <script>
    let ingredientDatabase = {};

    const productRecommendations = {
      oily: [
        { name: "Gel Cleanser", reason: "Best for oily or acne-prone skin because it feels lightweight and non-greasy." },
        { name: "Niacinamide Serum", reason: "Helps with oil control, redness, and uneven tone." },
        { name: "Oil-Free Moisturizer", reason: "Hydrates without feeling heavy or pore-clogging." }
      ],
      dry: [
        { name: "Cream Cleanser", reason: "Gentle and less stripping for dry skin." },
        { name: "Hydrating Serum", reason: "Look for glycerin, hyaluronic acid, panthenol, and urea." },
        { name: "Barrier Cream", reason: "Supports dry skin with ceramides and occlusives." }
      ],
      sensitive: [
        { name: "Fragrance-Free Cleanser", reason: "Reduces risk of irritation." },
        { name: "Barrier Repair Moisturizer", reason: "Look for ceramides, panthenol, allantoin, and centella." },
        { name: "Mineral Sunscreen", reason: "Often better tolerated by sensitive skin." }
      ],
      normal: [
        { name: "Gentle Daily Cleanser", reason: "Simple cleanser that does not strip the skin." },
        { name: "Antioxidant Serum", reason: "Vitamin C or green tea can support glow and protection." },
        { name: "Daily SPF", reason: "The most important product for long-term skin health." }
      ]
    };

    async function loadIngredientDatabase() {
      try {
        const response = await fetch("./database/ingredients.json");
        const data = await response.json();
        ingredientDatabase = data;
        console.log("Ingredient database loaded:", ingredientDatabase);
      } catch (error) {
        console.error("Could not load ingredient database:", error);
      }
    }

    function analyzeIngredients() {
      let text = document.getElementById("ingredients").value.toLowerCase();
      let skinType = document.getElementById("skinType").value;

      text = text.replace(/\(.*?\)/g, "");
      let ingredients = text.split(",");

      let good = [];
      let warnings = [];
      let unknown = [];

      let acneScore = 0;
      let irritationScore = 0;

      ingredients.forEach(i => {
        let ingredient = i.trim();

        if (ingredientDatabase[ingredient]) {
          let data = ingredientDatabase[ingredient];

          let comedogenic = data.comedogenic_rating || 0;
          let irritation = data.irritation_risk || "none";

          acneScore += comedogenic;

          if (irritation === "medium") irritationScore += 2;
          if (irritation === "high") irritationScore += 4;

          if (comedogenic >= 3 || irritation === "high") {
            warnings.push(`⚠ ${ingredient} — ${data.category}. Irritation risk: ${irritation}. Comedogenic rating: ${comedogenic}`);
          } else {
            good.push(`✔ ${ingredient} — ${data.benefits ? data.benefits.join(", ") : "generally skin-supportive"}`);
          }

        } else if (ingredient.length > 0) {
          unknown.push(`• ${ingredient}`);
        }
      });

      let acneLevel = getLevel(acneScore);
      let irritationLevel = getLevel(irritationScore);

      let products = productRecommendations[skinType];

      let resultHTML = `
        <div class="score-grid">
          <div class="score-card">
            <h3>Acne / Pore-Clogging Score</h3>
            <div class="score-number ${acneLevel.className}">${acneScore}</div>
            <p>${acneLevel.label}</p>
          </div>

          <div class="score-card">
            <h3>Irritation Score</h3>
            <div class="score-number ${irritationLevel.className}">${irritationScore}</div>
            <p>${irritationLevel.label}</p>
          </div>

          <div class="score-card">
            <h3>Skin Type Match</h3>
            <div class="score-number">${skinType}</div>
            <p>Recommendations are customized for your selected skin type.</p>
          </div>
        </div>

        <div class="results">
      `;

      if (good.length > 0) {
        resultHTML += `
          <div class="result-section">
            <h3>Good Ingredients</h3>
            ${good.map(item => `<div class="tag">${item}</div>`).join("")}
          </div>
        `;
      }

      if (warnings.length > 0) {
        resultHTML += `
          <div class="result-section">
            <h3>Ingredients to Watch</h3>
            ${warnings.map(item => `<div class="tag">${item}</div>`).join("")}
          </div>
        `;
      }

      if (unknown.length > 0) {
        resultHTML += `
          <div class="result-section">
            <h3>Not Found in Database Yet</h3>
            <p class="small">These ingredients are not bad automatically. They just are not in your database yet.</p>
            ${unknown.map(item => `<div class="tag">${item}</div>`).join("")}
          </div>
        `;
      }

      resultHTML += `
          <div class="result-section">
            <h3>Recommended Product Types</h3>
            <div class="product-grid">
              ${products.map(product => `
                <div class="product-card">
                  <h4>${product.name}</h4>
                  <p class="small">${product.reason}</p>
                </div>
              `).join("")}
            </div>
          </div>
        </div>
      `;

      document.getElementById("result").innerHTML = resultHTML;
    }

    function getLevel(score) {
      if (score <= 2) {
        return { label: "Low risk", className: "low" };
      } else if (score <= 6) {
        return { label: "Medium risk", className: "medium" };
      } else {
        return { label: "High risk", className: "high" };
      }
    }

    loadIngredientDatabase();
  </script>

</body>
</html>
